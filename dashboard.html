<div id="tab-history" class="w-full pb-6">
  
  <!-- CARD BIODATA -->
  <div class="bg-white dark:bg-brand-card p-4 rounded-2xl border border-gray-200 dark:border-gray-700 shadow-sm mb-6 flex items-center gap-4">
    <div class="relative w-16 h-16 rounded-full bg-gray-200 dark:bg-gray-700 overflow-hidden flex-shrink-0 border-2 border-brand-red shadow-inner">
      <img src="https://ui-avatars.com/api/?name=Atlet&background=ff4d4d&color=fff&bold=true" alt="Profile" class="w-full h-full object-cover">
    </div>
    <div>
      <p class="text-[10px] text-gray-500 dark:text-gray-400 font-semibold tracking-wider uppercase mb-0.5">Halo Atlet Masa Depan,</p>
      <h2 class="text-lg font-bold text-gray-800 dark:text-white leading-tight">Loading...</h2>
      <p id="dashboard-ku-text" class="text-[10px] font-bold text-brand-red mt-1 bg-brand-red/10 border border-brand-red/20 px-2 py-0.5 rounded-md inline-block">-</p>
    </div>
  </div>

  <!-- CARD MEDALI -->
  <div class="mb-6 grid grid-cols-3 gap-3">
    <!-- EMAS -->
    <div class="relative overflow-hidden rounded-2xl bg-gradient-to-br from-yellow-300 to-yellow-600 p-[1.5px] shadow-lg shadow-yellow-500/20 hover:scale-105 transition-transform">
      <div class="h-full w-full bg-white dark:bg-brand-card rounded-2xl p-3 text-center flex flex-col items-center justify-center relative z-10">
        <div class="absolute -top-4 -right-4 w-12 h-12 bg-yellow-400/20 rounded-full blur-xl"></div>
        <span class="text-2xl mb-1 drop-shadow-md">🥇</span>
        <span id="count-emas" class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-br from-yellow-400 to-yellow-600 tabular-nums">0</span>
        <span class="text-[9px] font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest mt-0.5">Emas</span>
      </div>
    </div>
    <!-- PERAK -->
    <div class="relative overflow-hidden rounded-2xl bg-gradient-to-br from-gray-300 to-gray-500 p-[1.5px] shadow-lg shadow-gray-400/20 hover:scale-105 transition-transform">
      <div class="h-full w-full bg-white dark:bg-brand-card rounded-2xl p-3 text-center flex flex-col items-center justify-center relative z-10">
        <div class="absolute -top-4 -right-4 w-12 h-12 bg-gray-400/20 rounded-full blur-xl"></div>
        <span class="text-2xl mb-1 drop-shadow-md">🥈</span>
        <span id="count-perak" class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-br from-gray-400 to-gray-500 tabular-nums">0</span>
        <span class="text-[9px] font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest mt-0.5">Perak</span>
      </div>
    </div>
    <!-- PERUNGGU -->
    <div class="relative overflow-hidden rounded-2xl bg-gradient-to-br from-amber-600 to-amber-800 p-[1.5px] shadow-lg shadow-amber-700/20 hover:scale-105 transition-transform">
      <div class="h-full w-full bg-white dark:bg-brand-card rounded-2xl p-3 text-center flex flex-col items-center justify-center relative z-10">
        <div class="absolute -top-4 -right-4 w-12 h-12 bg-amber-600/20 rounded-full blur-xl"></div>
        <span class="text-2xl mb-1 drop-shadow-md">🥉</span>
        <span id="count-perunggu" class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-br from-amber-500 to-amber-700 tabular-nums">0</span>
        <span class="text-[9px] font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest mt-0.5">Perunggu</span>
      </div>
    </div>
  </div>

  <!-- FILTER RECORD KOMPETISI -->
  <div class="flex justify-between items-center mb-4 mt-2">
    <h3 class="font-bold text-sm tracking-wider text-gray-800 dark:text-white uppercase">Record Kompetisi</h3>
    <div class="relative">
      <select id="history-year-filter" class="appearance-none bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-white text-[10px] font-bold rounded-lg pl-3 pr-8 py-1.5 focus:outline-none focus:border-brand-red cursor-pointer">
        <option value="2026">2026</option>
        <option value="2025">2025</option>
        <option value="2024">2024</option>
      </select>
      <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-400">
        <svg class="fill-current h-3 w-3" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
      </div>
    </div>
  </div>

  <!-- LISTING EVENT (Dinamic Load dari JS) -->
  <div id="container-history-list" class="space-y-3">
    <div class="text-center py-8 bg-gray-50 dark:bg-gray-800/30 rounded-xl border border-dashed border-gray-200 dark:border-gray-700 animate-pulse">
      <p class="text-xs text-gray-400 font-semibold uppercase tracking-widest">🔄 Menarik Data...</p>
    </div>
  </div>
</div>
