<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><title>Admin Dashboard</title>
  <link rel="stylesheet" href="/src/style.css">
  <script>
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
</head>
<body class="bg-[#1a1620] text-gray-200 font-sans min-h-screen p-4">
  <header class="max-w-4xl mx-auto flex justify-between items-center mb-6">
    <h1 class="text-xs font-bold text-gray-400 uppercase tracking-widest">Admin Control Panel</h1>
    <a href="/app.html" class="bg-gray-800 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-gray-700">🏠 Kembali ke App</a>
  </header>
  <main class="max-w-4xl mx-auto space-y-6">
    <div class="bg-[#221c29] p-5 rounded-2xl border border-gray-800">
      <h3 class="font-bold text-sm text-brand-red uppercase mb-4">👥 Daftar Atlet</h3>
      <table class="w-full text-left text-xs"><tbody id="admin-atlet-list"></tbody></table>
    </div>
    <div class="bg-[#221c29] p-5 rounded-2xl border border-gray-800">
      <h3 class="font-bold text-sm text-blue-500 uppercase mb-4">🏊 Manajemen Nomor Lomba</h3>
      <div class="flex gap-2 mb-4">
        <input type="text" id="admin-new-category" class="w-full px-3 py-2 bg-[#1a1620] border border-gray-700 rounded-lg text-sm" placeholder="cth: 25 M Gaya Bebas Papan">
        <button id="btn-add-category" class="bg-blue-600 text-white px-4 rounded-lg text-xs font-bold">Tambah</button>
      </div>
      <table class="w-full text-left text-xs"><tbody id="admin-category-list"></tbody></table>
    </div>
  </main>
  <script type="module" src="/src/admin.js"></script>
</body>
</html>
