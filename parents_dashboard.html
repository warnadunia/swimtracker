<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parents Monitoring - Swim Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
  <script>
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
</head>
<body class="bg-gray-50 dark:bg-[#120e16] text-gray-800 dark:text-gray-200 font-['Poppins',sans-serif] min-h-screen antialiased">

  <div class="max-w-md mx-auto min-h-screen flex flex-col bg-white dark:bg-[#18131f] shadow-2xl relative border-x border-gray-100 dark:border-gray-900 pb-12">
    
    <!-- HEADER PANEL PARENTS -->
    <header class="sticky top-0 bg-white/90 dark:bg-[#18131f]/90 backdrop-blur-md z-40 flex justify-between items-center px-4 h-16 border-b border-gray-100 dark:border-gray-800/80">
      <div>
        <h1 class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest leading-none mb-1">Parents Monitoring</h1>
        <p id="parent-display-name" class="text-sm font-bold text-gray-800 dark:text-white leading-none">Memuat nama...</p>
      </div>
      <button id="btn-parents-logout" class="bg-gray-100 dark:bg-[#251f2e] text-gray-600 dark:text-gray-400 p-2 rounded-xl text-xs font-bold hover:text-brand-red transition-all">
        🚪 Keluar
      </button>
    </header>

    <!-- CONTENT WRAPPER -->
    <main class="flex-1 p-4 space-y-4">
      <div class="bg-emerald-600/10 border border-emerald-500/20 rounded-2xl p-4 text-xs text-emerald-600 dark:text-emerald-400 font-medium">
        👋 Selamat datang di portal Wali Atlet PSSC. Di sini Anda dapat memantau kehadiran kolam dan rekam perkembangan catatan waktu latihan anak secara berkala.
      </div>

      <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider pl-1">Daftar Anak (Atlet)</h3>
      
      <!-- CONTAINER CARD ANAK-ANAK -->
      <div id="container-parent-children" class="space-y-4">
        <div class="text-center py-8 text-gray-400 text-xs">Mencari data hubungan anak di TiDB...</div>
      </div>
    </main>
  </div>

  <script type="module" src="/src/parents_main.js"></script>
</body>
</html>
