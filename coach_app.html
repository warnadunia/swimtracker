<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Coach App - PSSC</title>
  <link rel="stylesheet" href="/src/style.css">
  <link rel="manifest" href="/manifest.json">
  <script>
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
</head>
<body class="bg-gray-50 dark:bg-[#1a1620] text-gray-800 dark:text-white min-h-screen">

  <!-- GLOBAL TOP HEADER (Milik Semua Tab) -->
  <div class="flex justify-between items-center p-4 bg-white dark:bg-[#1a1620] sticky top-0 z-50 border-b border-gray-200 dark:border-gray-800">
    <h1 class="font-bold text-lg text-brand-red tracking-tight">Swim Tracker App</h1>
    <div class="flex items-center gap-2">
      <!-- Fullscreen Toggle -->
      <button id="fullscreen-toggle" class="p-2 text-gray-400 hover:text-brand-red rounded-full focus:outline-none">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
      </button>
      <!-- Theme Toggle -->
      <button id="theme-toggle" class="p-2 text-gray-400 hover:text-brand-red rounded-full focus:outline-none">
        <span class="text-xl dark:hidden">🌙</span>
        <span class="text-xl hidden dark:block">☀️</span>
      </button>
      <!-- Logout -->
      <button id="btn-logout" class="p-2 text-gray-400 hover:text-brand-red rounded-full focus:outline-none">
        <span class="text-xl">🚪</span>
      </button>
    </div>
  </div>

  <!-- TEMPAT INJECT HALAMAN (DASHBOARD, ATLET, TRAINING DLL) -->
  <div id="coach-main-container" class="pb-24"></div>

  <!-- TEMPAT INJECT BOTTOM NAV -->
  <div id="coach-nav-container"></div>

  <!-- TOAST NOTIFICATION -->
  <div id="toast-container" class="fixed top-5 right-5 z-[9999] flex flex-col gap-2 pointer-events-none"></div>

  <script type="module" src="/src/coach_main.js"></script>
</body>
</html>
