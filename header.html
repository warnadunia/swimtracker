<!-- header.html -->
<header id="main-header"
  class="fixed top-0 w-full max-w-md mx-auto z-50 bg-white/90 dark:bg-brand-dark/90 backdrop-blur-md border-b border-gray-100 dark:border-gray-800 transition-colors">
  <div class="px-4 py-3 flex items-center justify-between">

    <!-- BAGIAN KIRI (Logo & Title) -->
    <div id="header-left-section" class="flex items-center gap-3">
      <img src="/pssc-logo.png" alt="Logo"
        class="w-10 h-10 object-contain rounded-full shadow-sm bg-white border border-gray-100 dark:border-gray-700">

      <div class="flex flex-col">
        <h1 class="font-black text-sm text-gray-800 dark:text-white uppercase tracking-widest leading-tight">SWIMTRACKER
          APP</h1>
        <p class="text-[10px] font-medium text-brand-red leading-tight mt-0.5">Dashboard Atlet</p>
      </div>
    </div>

    <!-- BAGIAN KANAN (Action Buttons) -->
    <div class="flex items-center gap-2">
      <!-- Fullscreen -->
      <button id="btn-fullscreen"
        class="text-gray-400 hover:text-gray-800 dark:hover:text-white transition-colors p-1.5 rounded-lg"
        onclick="if(document.fullscreenElement){document.exitFullscreen();}else{document.documentElement.requestFullscreen();}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path>
        </svg>
      </button>

      <!-- Theme Toggle -->
      <button id="btn-theme" class="text-gray-400 hover:text-yellow-500 transition-colors p-1.5 rounded-lg">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z">
          </path>
        </svg>
      </button>

      <!-- Logout -->
      <button id="btn-logout" class="text-gray-400 hover:text-red-600 transition-colors p-1.5 rounded-lg">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
        </svg>
      </button>
    </div>

  </div>
</header>

<!-- Baris 2 -->
<div class="pb-3 text-center">
  <span class="text-[11px] font-bold text-gray-500 dark:text-gray-400 tracking-wider">Dashboard Atlet</span>
</div>
</header>
<div id="header-spacer" class="h-8 w-full"></div>
