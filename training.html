<div id="tab-training" class="w-full hidden pb-6">
  <!-- Pill Toggle for Sub-tabs -->
  <div class="flex justify-center mb-6">
    <div class="bg-gray-100 dark:bg-gray-800 p-1 rounded-xl inline-flex shadow-inner">
      <button onclick="window.switchTrainingTab('tt')" id="btn-tt" class="px-6 py-2 rounded-lg text-xs font-bold transition-all bg-white dark:bg-gray-700 shadow text-brand-red">
        Time Trial
      </button>
      <button onclick="window.switchTrainingTab('hw')" id="btn-hw" class="px-6 py-2 rounded-lg text-xs font-bold transition-all text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200">
        Home Work
      </button>
    </div>
  </div>

  <!-- Time Trial View -->
  <div id="training-tt-view" class="block space-y-6">
    <div class="flex justify-between items-center bg-white dark:bg-brand-card p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800">
      <h3 class="text-sm font-bold text-gray-800 dark:text-white">Trend Waktu (Time Trial)</h3>
      <select id="tt-style-filter" class="bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 text-xs font-semibold rounded-lg px-2 py-1 outline-none text-brand-red">
        <option value="all">Semua Gaya</option>
      </select>
    </div>

    <div class="bg-white dark:bg-brand-card p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800">
      <canvas id="ttChart" class="w-full h-56"></canvas>
    </div>

    <div class="bg-white dark:bg-brand-card rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 overflow-hidden">
      <div class="p-4 border-b border-gray-100 dark:border-gray-800 bg-gray-50/50 dark:bg-[#1a1423]">
        <h3 class="text-xs font-bold text-gray-800 dark:text-white uppercase tracking-wider">Histori Time Trial</h3>
      </div>
      <div id="tt-list-container" class="divide-y divide-gray-100 dark:divide-gray-800">
        <!-- List diinjeksi via JS -->
      </div>
    </div>
  </div>

  <!-- Home Work View -->
  <div id="training-hw-view" class="hidden space-y-4">
    <div class="bg-white dark:bg-brand-card p-5 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800">
      <h3 class="text-sm font-bold text-brand-red uppercase tracking-wider mb-2">Tugas Dryland / Latihan</h3>
      <p class="text-xs text-gray-500 dark:text-gray-400 mb-4">Centang aktivitas yang sudah kamu selesaikan hari ini.</p>
      
      <!-- Mock Checklist -->
      <div class="space-y-3">
        <label class="flex items-center gap-3 p-3 bg-gray-50 dark:bg-[#140e16] rounded-xl border border-gray-100 dark:border-gray-800 cursor-pointer active:scale-[0.98] transition-transform">
          <input type="checkbox" class="w-5 h-5 accent-brand-red rounded border-gray-300">
          <div class="flex-1">
            <h4 class="text-xs font-bold text-gray-800 dark:text-gray-200">Push Up 3 Set</h4>
            <p class="text-[10px] text-gray-500">15 repetisi per set</p>
          </div>
        </label>
        
        <label class="flex items-center gap-3 p-3 bg-gray-50 dark:bg-[#140e16] rounded-xl border border-gray-100 dark:border-gray-800 cursor-pointer active:scale-[0.98] transition-transform">
          <input type="checkbox" class="w-5 h-5 accent-brand-red rounded border-gray-300">
          <div class="flex-1">
            <h4 class="text-xs font-bold text-gray-800 dark:text-gray-200">Plank 3 Menit</h4>
            <p class="text-[10px] text-gray-500">Istirahat 30 detik tiap 1 menit</p>
          </div>
        </label>
        
        <label class="flex items-center gap-3 p-3 bg-gray-50 dark:bg-[#140e16] rounded-xl border border-gray-100 dark:border-gray-800 cursor-pointer active:scale-[0.98] transition-transform">
          <input type="checkbox" class="w-5 h-5 accent-brand-red rounded border-gray-300">
          <div class="flex-1">
            <h4 class="text-xs font-bold text-gray-800 dark:text-gray-200">Stretching Kaki</h4>
            <p class="text-[10px] text-gray-500">Fokus hamstring dan ankle</p>
          </div>
        </label>
      </div>
      
      <button class="w-full mt-5 bg-brand-red text-white py-3 rounded-xl text-xs font-bold shadow-lg shadow-brand-red/30 active:scale-95 transition-all">
        Kirim Laporan
      </button>
    </div>
  </div>
</div>
