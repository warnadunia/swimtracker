<div id="tab-grafik" class="w-full pb-24">
  
  <!-- TOMBOL INPUT KEJUARAAN (HANYA UNTUK PARENTS, DI-SHOW/HIDE VIA JS) -->

      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      Input Data Kejuaraan

  </div>

  <!-- CARD BIOMETRIK ANAK -->

    <div class="flex justify-between items-center mb-3">

      <button onclick="window.openBiometrikModal()" class="text-[9px] font-bold text-brand-red uppercase tracking-wider hover:underline">Update Data</button>
    </div>
    <div class="grid grid-cols-3 gap-3">
      <div class="bg-gray-50 dark:bg-[#2b2532] p-2 rounded-xl text-center">
        <p class="text-[9px] text-gray-500 uppercase tracking-widest font-bold mb-1">Tinggi</p>
        <p class="font-mono text-sm font-bold text-brand-red"><span id="bio-display-height">--</span> <span class="text-[9px] text-gray-400">cm</span></p>
      </div>
      <div class="bg-gray-50 dark:bg-[#2b2532] p-2 rounded-xl text-center">
        <p class="text-[9px] text-gray-500 uppercase tracking-widest font-bold mb-1">Berat</p>
        <p class="font-mono text-sm font-bold text-brand-red"><span id="bio-display-weight">--</span> <span class="text-[9px] text-gray-400">kg</span></p>
      </div>
      <div class="bg-gray-50 dark:bg-[#2b2532] p-2 rounded-xl text-center">
        <p class="text-[9px] text-gray-500 uppercase tracking-widest font-bold mb-1">Arm Span</p>
        <p class="font-mono text-sm font-bold text-brand-red"><span id="bio-display-arm">--</span> <span class="text-[9px] text-gray-400">cm</span></p>
      </div>
    </div>
  </div>
  <div class="flex overflow-x-auto gap-3 pb-2 mb-4 hide-scrollbar">
    <button class="pill-gaya px-5 py-2.5 rounded-full bg-brand-red text-white text-xs font-bold whitespace-nowrap shadow-md shadow-brand-red/40 transition-all" data-style="Bebas">Gaya Bebas</button>
    <button class="pill-gaya px-5 py-2.5 rounded-full bg-gray-100 dark:bg-[#1f1a24] text-gray-500 dark:text-gray-400 text-xs font-bold whitespace-nowrap border border-gray-200 dark:border-gray-700 hover:text-brand-red transition-all" data-style="Kupu">Gaya Kupu</button>
    <button class="pill-gaya px-5 py-2.5 rounded-full bg-gray-100 dark:bg-[#1f1a24] text-gray-500 dark:text-gray-400 text-xs font-bold whitespace-nowrap border border-gray-200 dark:border-gray-700 hover:text-brand-red transition-all" data-style="Punggung">Gaya Punggung</button>
    <button class="pill-gaya px-5 py-2.5 rounded-full bg-gray-100 dark:bg-[#1f1a24] text-gray-500 dark:text-gray-400 text-xs font-bold whitespace-nowrap border border-gray-200 dark:border-gray-700 hover:text-brand-red transition-all" data-style="Dada">Gaya Dada</button>
    <button class="pill-gaya px-5 py-2.5 rounded-full bg-gray-100 dark:bg-[#1f1a24] text-gray-500 dark:text-gray-400 text-xs font-bold whitespace-nowrap border border-gray-200 dark:border-gray-700 hover:text-brand-red transition-all" data-style="Ganti">Gaya Ganti</button>

  <div class="bg-white dark:bg-[#1f1a24] p-4 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm mb-6">

      <h3 class="font-bold text-xs tracking-widest text-gray-800 dark:text-white uppercase">Tren Waktu (Detik)</h3>
      
      <!-- DROPDOWN TAHUN VS TAHUN -->
      <div class="flex items-center gap-1.5">
        <select id="grafik-year-filter" class="appearance-none bg-gray-100 dark:bg-[#2b2532] border border-gray-200 dark:border-gray-700 text-brand-red text-[10px] font-bold rounded-md px-2 py-1 focus:outline-none cursor-pointer">
          <option value="2026">2026</option>
          <option value="2025">2025</option>
          <option value="2024">2024</option>
        </select>
        <span class="text-[9px] font-bold text-gray-400">VS</span>
        <select id="grafik-compare-filter" class="appearance-none bg-gray-100 dark:bg-[#2b2532] border border-gray-200 dark:border-gray-700 text-gray-500 dark:text-gray-400 text-[10px] font-bold rounded-md px-2 py-1 focus:outline-none cursor-pointer">
          <option value="2025">2025</option>
          <option value="2024">2024</option>
          <option value="2023">2023</option>
          <option value="none">-- Off --</option>
        </select>
      </div>
    </div>
    
    <div class="relative h-56 w-full">
      <canvas id="prestasiChart"></canvas>
    </div>
    
    <div class="flex items-center gap-1.5 w-full justify-center mt-2 text-[9px]"><span class="w-4 h-0 border-t-2 border-dashed border-gray-400 opacity-50"></span> Garis putus-putus = Tahun Pembanding</div>
    
    <div class="flex flex-wrap justify-center gap-3 mt-4 text-[10px] font-bold text-gray-500 dark:text-gray-400">
      <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-[#d946ef]"></span> 25 M</div>
      <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-[#22c55e]"></span> 50 M</div>
      <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-[#eab308]"></span> 100 M</div>
      <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-[#06b6d4]"></span> 200 M</div>
      <div class="flex items-center gap-1.5"><span class="w-4 h-0 border-t-2 border-dashed border-gray-400"></span> Target</div>
    </div>
  </div>

  <div class="bg-white dark:bg-[#1a1620] rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm overflow-hidden mb-6">
    <div class="p-4 border-b border-gray-100 dark:border-gray-800">
      <h3 class="font-bold text-xs tracking-widest text-gray-800 dark:text-white uppercase">Hasil Perlombaan</h3>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-left text-sm whitespace-nowrap">
        <thead class="bg-gray-50 dark:bg-[#221c29] text-gray-600 dark:text-gray-400 border-b border-gray-200 dark:border-gray-800 text-[10px] uppercase">

        <tbody id="table-grafik-body" class="divide-y divide-gray-100 dark:divide-gray-800">
          </tbody>
