<div id="tab-grafik" class="p-4 w-full pb-24">

  <!-- TOMBOL INPUT KEJUARAAN (HANYA UNTUK PARENTS, DI-SHOW/HIDE VIA JS) -->
  <div class="mb-4 hidden" id="container-btn-input-kejuaraan">
    <button id="btn-input-kejuaraan"
      class="w-full bg-gradient-to-r from-brand-red to-rose-600 text-white font-bold py-3 rounded-2xl shadow-lg shadow-brand-red/30 flex items-center justify-center gap-2 active:scale-95 transition-all text-xs uppercase tracking-wider">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
      </svg>
      Input Data Kejuaraan
    </button>
  </div>

  <!-- PERKEMBANGAN FISIK (SPARKLINE STACK) -->
  <div class="bg-white dark:bg-brand-card p-4 rounded-2xl border border-gray-200 dark:border-gray-700 shadow-sm mb-6">
    <div class="flex justify-between items-center mb-4">
      <h3 class="font-bold text-xs tracking-wider text-gray-800 dark:text-white uppercase">Perkembangan Fisik</h3>
      <button onclick="window.openBiometrikModal()"
        class="text-brand-red hover:bg-red-50 dark:hover:bg-red-900/20 p-1 rounded-md transition-colors"
        title="Tambah Data">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
        </svg>
      </button>
    </div>

    <div class="space-y-4">
      <!-- BARIS 1: TINGGI BADAN -->
      <div class="flex items-center justify-between pb-4 border-b border-gray-100 dark:border-gray-800">
        <div class="w-1/2">
          <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Tinggi Badan</p>
          <div class="flex items-baseline gap-2 mt-1">
            <span id="bio-val-height"
              class="text-xl font-black text-gray-800 dark:text-white tabular-nums leading-none">--</span>
            <span class="text-[10px] font-bold text-gray-400">cm</span>
            <span id="bio-trend-height" class="text-[10px] font-bold flex items-center tabular-nums"></span>
          </div>
        </div>
        <div class="w-1/3 h-10 relative">
          <canvas id="sparklineHeight"></canvas>
        </div>
      </div>

      <!-- BARIS 2: BERAT BADAN -->
      <div class="flex items-center justify-between pb-4 border-b border-gray-100 dark:border-gray-800">
        <div class="w-1/2">
          <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Berat Badan</p>
          <div class="flex items-baseline gap-2 mt-1">
            <span id="bio-val-weight"
              class="text-xl font-black text-gray-800 dark:text-white tabular-nums leading-none">--</span>
            <span class="text-[10px] font-bold text-gray-400">kg</span>
            <span id="bio-trend-weight" class="text-[10px] font-bold flex items-center tabular-nums"></span>
          </div>
        </div>
        <div class="w-1/3 h-10 relative">
          <canvas id="sparklineWeight"></canvas>
        </div>
      </div>

      <!-- BARIS 3: RENTANG LENGAN -->
      <div class="flex items-center justify-between">
        <div class="w-1/2">
          <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Rentang Lengan</p>
          <div class="flex items-baseline gap-2 mt-1">
            <span id="bio-val-arm"
              class="text-xl font-black text-gray-800 dark:text-white tabular-nums leading-none">--</span>
            <span class="text-[10px] font-bold text-gray-400">cm</span>
            <span id="bio-trend-arm" class="text-[10px] font-bold flex items-center tabular-nums"></span>
          </div>
        </div>
        <div class="w-1/3 h-10 relative">
          <canvas id="sparklineArm"></canvas>
        </div>
      </div>
    </div>
  </div>

  <div id="modal-biometrik" class="hidden fixed inset-0 z-[60] bg-black/60 backdrop-blur-sm overflow-y-auto">
    <div class="min-h-screen flex items-center justify-center p-4">
      <div id="modal-bio-inner"
        class="w-full max-w-sm bg-white dark:bg-brand-dark border dark:border-gray-700 shadow-xl rounded-2xl transform transition-all opacity-0 scale-95 p-5">
        <div class="flex justify-between items-center mb-4 border-b dark:border-gray-700 pb-3">
          <h3 class="font-bold text-gray-800 dark:text-white uppercase tracking-widest text-sm">UPDATE DATA FISIK</h3>
          <button type="button" onclick="window.closeModal('modal-biometrik', 'modal-bio-inner')"
            class="text-gray-400 hover:text-gray-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
        </div>
        <div class="space-y-4 mb-5">
          <div>
            <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1">Tinggi Badan (cm)</label>
            <input type="number" id="bio-height"
              class="w-full px-3 py-2 bg-gray-50 dark:bg-brand-dark border border-gray-200 dark:border-gray-600 rounded-lg focus:border-brand-red outline-none text-sm text-center font-mono font-bold text-brand-red">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1">Berat Badan (kg)</label>
            <input type="number" step="0.1" id="bio-weight"
              class="w-full px-3 py-2 bg-gray-50 dark:bg-brand-dark border border-gray-200 dark:border-gray-600 rounded-lg focus:border-brand-red outline-none text-sm text-center font-mono font-bold text-brand-red">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1">Rentang Lengan (cm)</label>
            <input type="number" id="bio-arm"
              class="w-full px-3 py-2 bg-gray-50 dark:bg-brand-dark border border-gray-200 dark:border-gray-600 rounded-lg focus:border-brand-red outline-none text-sm text-center font-mono font-bold text-brand-red">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1">Tanggal Rekam</label>
            <input type="date" id="bio-date"
              class="w-full px-3 py-2 bg-gray-50 dark:bg-brand-dark border border-gray-200 dark:border-gray-600 rounded-lg focus:border-brand-red outline-none text-sm">
          </div>
        </div>
        <button onclick="window.submitBiometrik()"
          class="w-full bg-brand-red hover:bg-red-600 text-white font-bold py-3 px-4 rounded-xl transition-colors shadow-lg shadow-brand-red/30 uppercase tracking-widest text-xs">SIMPAN
          DATA FISIK</button>
      </div>
    </div>
  </div>

  <div class="bg-gray-100/50 dark:bg-[#1f1927] p-1 rounded-xl flex gap-1 overflow-x-auto hide-scrollbar mb-4">
    <button
      class="pill-gaya px-4 py-2 rounded-lg text-xs whitespace-nowrap bg-white text-gray-800 dark:bg-gray-700 dark:text-white shadow-sm font-bold transition-all"
      data-style="Bebas">Gaya Bebas</button>
    <button
      class="pill-gaya px-4 py-2 rounded-lg text-xs whitespace-nowrap text-gray-500 dark:text-gray-400 font-medium transition-all"
      data-style="Kupu">Gaya Kupu</button>
    <button
      class="pill-gaya px-4 py-2 rounded-lg text-xs whitespace-nowrap text-gray-500 dark:text-gray-400 font-medium transition-all"
      data-style="Punggung">Gaya Punggung</button>
    <button
      class="pill-gaya px-4 py-2 rounded-lg text-xs whitespace-nowrap text-gray-500 dark:text-gray-400 font-medium transition-all"
      data-style="Dada">Gaya Dada</button>
    <button
      class="pill-gaya px-4 py-2 rounded-lg text-xs whitespace-nowrap text-gray-500 dark:text-gray-400 font-medium transition-all"
      data-style="Ganti">Gaya Ganti</button>
  </div>

  <div class="bg-white dark:bg-[#1f1a24] p-4 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm mb-6">
    <div class="flex justify-between items-center mb-6">
      <h3 class="font-bold text-xs tracking-widest text-gray-800 dark:text-white uppercase">Tren Waktu (Detik)</h3>

      <!-- DROPDOWN TAHUN VS TAHUN -->
      <div class="flex items-center gap-1.5">
        <select id="grafik-year-filter"
          class="appearance-none bg-gray-100 dark:bg-[#2b2532] border border-gray-200 dark:border-gray-700 text-brand-red text-[10px] font-bold rounded-md px-2 py-1 focus:outline-none cursor-pointer">
          <option value="2026">2026</option>
          <option value="2025">2025</option>
          <option value="2024">2024</option>
        </select>
        <span class="text-[9px] font-bold text-gray-400">VS</span>
        <select id="grafik-compare-filter"
          class="appearance-none bg-gray-100 dark:bg-[#2b2532] border border-gray-200 dark:border-gray-700 text-gray-500 dark:text-gray-400 text-[10px] font-bold rounded-md px-2 py-1 focus:outline-none cursor-pointer">
          <option value="2025">2025</option>
          <option value="2024">2024</option>
          <option value="2023">2023</option>
          <option value="none">-- Off --</option>
        </select>
      </div>
    </div>

    <div class="relative h-56 w-full">
      <canvas id="prestasiChart"></canvas>
    </div>

    <div class="flex items-center gap-1.5 w-full justify-center mt-2 text-[9px]"><span
        class="w-4 h-0 border-t-2 border-dashed border-gray-400 opacity-50"></span> Garis putus-putus = Tahun Pembanding
    </div>

    <div class="flex flex-wrap justify-center gap-3 mt-4 text-[10px] font-bold text-gray-500 dark:text-gray-400">
      <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-[#d946ef]"></span> 25 M</div>
      <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-[#22c55e]"></span> 50 M</div>
      <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-[#eab308]"></span> 100 M</div>
      <div class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-[#06b6d4]"></span> 200 M</div>
      <div class="flex items-center gap-1.5"><span class="w-4 h-0 border-t-2 border-dashed border-gray-400"></span>
        Target</div>
    </div>
  </div>

  <div
    class="bg-white dark:bg-[#1a1620] rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm overflow-hidden mb-6">
    <div class="p-4 border-b border-gray-100 dark:border-gray-800">
      <h3 class="font-bold text-xs tracking-widest text-gray-800 dark:text-white uppercase">Hasil Perlombaan</h3>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-left text-sm whitespace-nowrap">
        <thead
          class="bg-gray-50 dark:bg-[#221c29] text-gray-600 dark:text-gray-400 border-b border-gray-200 dark:border-gray-800 text-[10px] uppercase">
          <tr>
            <th class="px-4 py-3 font-bold">Jarak</th>
            <th class="px-4 py-3 font-bold text-center">Rekor Waktu</th>
            <th class="px-4 py-3 font-bold text-center">Target Coach</th>
            <th class="px-4 py-3 font-bold">Event</th>
          </tr>
        </thead>
        <tbody id="table-grafik-body" class="divide-y divide-gray-100 dark:divide-gray-800">
        </tbody>
      </table>
    </div>
  </div>
</div>
