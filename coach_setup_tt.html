<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Setup Time Trial</title>
  <link rel="stylesheet" href="/src/style.css">
  <script>
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
</head>
<body class="bg-gray-50 dark:bg-[#1a1620] text-gray-800 dark:text-white min-h-screen pb-28">

  <div class="p-4 flex items-center gap-3 border-b border-gray-200 dark:border-gray-800 bg-white dark:bg-[#1a1620] sticky top-0 z-50">
    <button onclick="window.location.href='/coach_app.html'" class="p-2 text-gray-500 hover:text-brand-red dark:text-gray-400">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
    </button>
    <h2 class="text-base font-bold uppercase tracking-wider">Setup Time Trial</h2>
  </div>

  <div class="p-4 max-w-md mx-auto space-y-4">
    <div class="bg-white dark:bg-[#221c29] p-4 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm space-y-4">
      <div>
        <label class="block text-xs font-semibold text-gray-500 mb-1">Judul Latihan / TT</label>
        <input type="text" id="tt-title" placeholder="Contoh: Warm Up" class="w-full px-4 py-3 bg-gray-50 dark:bg-[#1a1620] border border-gray-200 dark:border-gray-700 rounded-xl focus:border-brand-red outline-none text-sm">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1">Target Jarak (M)</label>
          <input type="number" id="tt-target" placeholder="300" class="w-full px-4 py-3 bg-gray-50 dark:bg-[#1a1620] border border-gray-200 dark:border-gray-700 rounded-xl outline-none text-sm">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1">Kolam (M)</label>
          <select id="tt-pool" class="w-full px-4 py-3 bg-gray-50 dark:bg-[#1a1620] border border-gray-200 dark:border-gray-700 rounded-xl outline-none text-sm">
            <option value="25">25 M</option>
            <option value="50">50 M</option>
          </select>
        </div>
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-500 mb-1">Set (Repetisi)</label>
        <input type="number" id="tt-sets" placeholder="Otomatis" class="w-full px-4 py-3 bg-gray-50 dark:bg-[#1a1620] border border-gray-200 dark:border-gray-700 rounded-xl outline-none text-sm">
      </div>
    </div>

    <div class="bg-white dark:bg-[#221c29] p-4 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm">
      <h4 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Atlet Hadir Hari Ini</h4>
      <div id="atlet-list-checkbox" class="space-y-2 max-h-[40vh] overflow-y-auto pr-1">
        </div>
    </div>
  </div>

  <div class="fixed bottom-0 left-0 right-0 p-4 max-w-md mx-auto z-40 bg-white dark:bg-[#1a1620] border-t border-gray-100 dark:border-gray-800">
    <button id="btn-start-tt" class="w-full bg-brand-red hover:bg-red-600 text-white font-bold py-4 px-4 rounded-xl shadow-lg text-sm uppercase tracking-wider">
      🚀 Mulai Time Trial 
    </button>
  </div>

  <script type="module" src="/src/coach_setup_tt.js"></script>
</body>
</html>
