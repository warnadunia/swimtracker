<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Stopwatch Multi-Split TT</title>
  <link rel="stylesheet" href="/src/style.css">
  <script>
    document.documentElement.classList.add('dark'); // Paksa dark-mode di arena pencatatan waktu
  </script>
</head>
<body class="bg-black text-white h-screen flex flex-col overflow-hidden">

  <div class="p-4 flex justify-between items-center border-b border-zinc-900 bg-zinc-950 shrink-0">
    <div>
      <h3 id="view-tt-title" class="text-xs font-bold text-brand-red tracking-wider uppercase">---</h3>
      <p id="view-tt-meta" class="text-[10px] text-gray-400 mt-0.5">---</p>
    </div>
    <button id="btn-abort-tt" class="text-xs font-bold text-gray-500 border border-zinc-800 px-3 py-1.5 rounded-lg bg-zinc-900 active:scale-95 transition-transform">BATAL</button>
  </div>

  <div class="flex flex-col items-center justify-center pt-8 pb-4 shrink-0 bg-black">
    <div id="sw-display" class="text-6xl sm:text-7xl font-mono font-bold tracking-wider mb-6 text-white tabular-nums">00:00:00.00</div>
    
    <div class="flex items-center gap-4 justify-center w-full max-w-sm px-4">
      <button id="sw-btn-reset" class="w-16 h-16 shrink-0 rounded-full border-2 border-zinc-800 text-gray-400 font-bold bg-zinc-900/50 flex items-center justify-center active:scale-95 transition-transform">
        RESET
      </button>
      
      <button id="sw-btn-main" class="flex-1 h-16 rounded-2xl bg-brand-red text-white font-bold text-lg sm:text-xl shadow-[0_0_40px_rgba(255,77,77,0.4)] flex items-center justify-center active:scale-95 transition-all select-none">
        START
      </button>
    </div>
  </div>

  <div class="flex-1 overflow-y-auto px-4 mt-2 border-t border-zinc-900 bg-zinc-950/30 pt-4 pb-20 relative">
    <h4 class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-3 sticky top-0 bg-black/90 backdrop-blur py-2 z-10">
      Urutan Record Catatan Waktu
    </h4>
    <div id="split-records-log" class="space-y-2">
      </div>
  </div>

  <div class="p-4 bg-zinc-950 border-t border-zinc-900 shrink-0">
    <button id="btn-save-tt" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3.5 rounded-xl transition-colors text-sm uppercase tracking-wider opacity-50 pointer-events-none active:scale-95">
      💾 Simpan Hasil Time Trial
    </button>
  </div>

  <div id="bottom-sheet-atlet" class="fixed inset-0 bg-black/80 z-[100] transition-opacity duration-300 opacity-0 pointer-events-none flex items-end justify-center">
    <div class="w-full max-w-md bg-zinc-900 rounded-t-3xl border-t border-zinc-800 p-5 transform translate-y-full transition-transform duration-300 max-h-[70vh] flex flex-col">
      <div class="w-12 h-1.5 bg-zinc-700 rounded-full mx-auto mb-4"></div>
      <h3 class="text-sm font-bold text-center text-white mb-2 uppercase tracking-wide">Pilih Atlet Yang Finish</h3>
      <p id="target-split-time-label" class="text-center font-mono text-brand-red font-bold text-lg mb-4">00:00.00</p>
      
      <div id="sheet-atlet-list" class="flex-1 overflow-y-auto space-y-2 pr-1 pb-4">
        </div>
    </div>
  </div>

  <div id="toast-container" class="fixed top-5 right-5 z-[9999] flex flex-col gap-2 pointer-events-none"></div>

  <script type="module" src="/src/coach_stopwatch_tt.js"></script>
</body>
</html>
