<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" href="data:,\">
  <title>Login - Swim Tracker App</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
  <script>
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
</head>
<body class="bg-gray-50 dark:bg-brand-dark text-gray-800 dark:text-gray-200 font-sans h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md bg-white dark:bg-brand-card p-6 rounded-2xl shadow-xl border border-gray-200 dark:border-gray-700">
    
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold uppercase tracking-wider text-brand-red">Swim Tracker App</h1>
      <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Catat dan pantau prestasi atlet</p>
    </div>

    <div class="flex p-1 bg-gray-100 dark:bg-gray-800 rounded-lg mb-6">
      <button id="btn-tab-login" onclick="switchAuth('login')" class="w-1/2 py-2 text-sm font-semibold rounded-md bg-white dark:bg-brand-card shadow-sm text-brand-red transition-all">Login</button>
      <button id="btn-tab-register" onclick="switchAuth('register')" class="w-1/2 py-2 text-sm font-semibold rounded-md text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 transition-all">Daftar</button>
    </div>

    <form id="form-login" class="space-y-4 block">
      <div>
        <label class="block text-sm font-medium mb-1">Username</label>
        <input type="text" id="login-username" required class="w-full px-4 py-2 bg-gray-50 dark:bg-brand-dark border border-gray-200 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-brand-red outline-none transition-all text-sm" placeholder="cth: budi_perenang">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Password</label>
        <div class="relative">
          <input type="password" id="login-password" required class="w-full px-4 py-2 pr-10 bg-gray-50 dark:bg-brand-dark border border-gray-200 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-brand-red outline-none transition-all text-sm" placeholder="••••••••">
          <button type="button" onclick="togglePassword('login-password', this)" class="absolute inset-y-0 right-0 px-3 flex items-center text-gray-400 hover:text-brand-red transition-colors">
            <svg class="w-5 h-5 icon-eye" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
          </button>
        </div>
      </div>
      <button type="submit" id="btn-submit-login" class="w-full bg-brand-red hover:bg-red-600 text-white font-bold py-3 rounded-xl transition-colors mt-4">
        Masuk
      </button>
    </form>

    <form id="form-register" class="space-y-4 hidden">
      <div>
        <label class="block text-sm font-medium mb-1">Nama Lengkap</label>
        <input type="text" id="reg-name" required class="w-full px-4 py-2 bg-gray-50 dark:bg-brand-dark border border-gray-200 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-brand-red outline-none transition-all text-sm" placeholder="Nama Asli Atlet">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Username (Untuk Login)</label>
        <input type="text" id="reg-username" required class="w-full px-4 py-2 bg-gray-50 dark:bg-brand-dark border border-gray-200 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-brand-red outline-none transition-all text-sm" placeholder="cth: budi_perenang (Tanpa Spasi)">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Tahun Lahir</label>
        <input type="number" id="reg-year" required class="w-full px-4 py-2 bg-gray-50 dark:bg-brand-dark border border-gray-200 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-brand-red outline-none transition-all text-sm" placeholder="Contoh: 2010">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Password</label>
        <div class="relative">
          <input type="password" id="reg-password" required class="w-full px-4 py-2 pr-10 bg-gray-50 dark:bg-brand-dark border border-gray-200 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-brand-red outline-none transition-all text-sm" placeholder="Minimal 6 karakter">
          <button type="button" onclick="togglePassword('reg-password', this)" class="absolute inset-y-0 right-0 px-3 flex items-center text-gray-400 hover:text-brand-red transition-colors">
            <svg class="w-5 h-5 icon-eye" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
          </button>
        </div>
      </div>
      <button type="submit" id="btn-submit-register" class="w-full bg-brand-red hover:bg-red-600 text-white font-bold py-3 rounded-xl transition-colors mt-2">
        Buat Akun
      </button>
    </form>

  </div>

  <script>
    window.switchAuth = function(type) {
      const formLogin = document.getElementById('form-login');
      const formRegister = document.getElementById('form-register');
      const btnLogin = document.getElementById('btn-tab-login');
      const btnRegister = document.getElementById('btn-tab-register');

      if (type === 'login') {
        formLogin.classList.replace('hidden', 'block');
        formRegister.classList.replace('block', 'hidden');
        btnLogin.className = "w-1/2 py-2 text-sm font-semibold rounded-md bg-white dark:bg-brand-card shadow-sm text-brand-red transition-all";
        btnRegister.className = "w-1/2 py-2 text-sm font-semibold rounded-md text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 transition-all";
      } else {
        formRegister.classList.replace('hidden', 'block');
        formLogin.classList.replace('block', 'hidden');
        btnRegister.className = "w-1/2 py-2 text-sm font-semibold rounded-md bg-white dark:bg-brand-card shadow-sm text-brand-red transition-all";
        btnLogin.className = "w-1/2 py-2 text-sm font-semibold rounded-md text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 transition-all";
      }
    };

    window.togglePassword = function(inputId, btnElement) {
      const input = document.getElementById(inputId);
      const icon = btnElement.querySelector('svg');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>`;
      } else {
        input.type = 'password';
        icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>`;
      }
    };
  </script>
  
  <script type="module" src="/src/auth.js"></script>
</body>
</html>
