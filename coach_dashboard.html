<div class="p-4 max-w-md mx-auto space-y-5">
  
  <div class="bg-white dark:bg-[#221c29] p-4 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm flex items-center justify-between">
    <div class="flex items-center gap-4">
      <div class="w-12 h-12 rounded-full bg-brand-red/20 border-2 border-brand-red flex items-center justify-center font-bold text-brand-red text-lg">CH</div>
      <div>
        <h2 id="coach-name" class="font-bold text-base leading-tight">Coach Name</h2>
        <p id="coach-role" class="text-[10px] text-gray-400 mt-0.5 uppercase tracking-wider">Coach</p>
      </div>
    </div>
    <a href="/profile.html" class="p-2 text-gray-400 hover:text-brand-red bg-gray-50 dark:bg-zinc-800/50 rounded-full transition-colors">⚙️</a>
  </div>

  <div class="grid grid-cols-3 gap-3">
    <button onclick="window.location.href='/coach_tt_setup.html'" class="bg-brand-red text-white p-3 rounded-xl shadow-md shadow-brand-red/20 flex flex-col justify-center items-center gap-2 active:scale-95 transition-transform text-center">
      <span class="text-2xl">⏱️</span>
      <span class="text-[10px] font-bold uppercase tracking-wider leading-tight">Mulai<br>Time Trial</span>
    </button>
    
    <button onclick="window.switchCoachTab('tab-coach-absen')" class="bg-emerald-600 text-white p-3 rounded-xl shadow-md shadow-emerald-600/20 flex flex-col justify-center items-center gap-2 active:scale-95 transition-transform text-center">
      <span class="text-2xl">📝</span>
      <span class="text-[10px] font-bold uppercase tracking-wider leading-tight">Absen<br>Atlet</span>
    </button>
    
    <button onclick="window.switchCoachTab('tab-coach-leaderboard')" class="bg-zinc-800 text-white p-3 rounded-xl shadow-md flex flex-col justify-center items-center gap-2 active:scale-95 transition-transform text-center">
      <span class="text-2xl">🏆</span>
      <span class="text-[10px] font-bold uppercase tracking-wider leading-tight">Leader<br>Board</span>
    </button>
  </div>

  <div class="bg-white dark:bg-[#221c29] p-4 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm space-y-4">
    <div class="flex justify-between items-center">
      <h4 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Statistik Prestasi</h4>
      <select id="medal-year-filter" class="appearance-none bg-gray-50 dark:bg-[#1a1620] border border-gray-200 dark:border-gray-700 text-brand-red text-[10px] font-bold rounded-lg px-2.5 py-1 focus:outline-none cursor-pointer">
        <option value="2026">2026</option>
        <option value="2025">2025</option>
      </select>
    </div>
    <div class="grid grid-cols-3 gap-2">
      <div class="bg-yellow-500/10 border border-yellow-500/20 rounded-xl p-3 flex flex-col items-center justify-center">
        <span class="text-2xl mb-1 drop-shadow-md">🥇</span>
        <span id="count-emas" class="font-bold text-xl text-yellow-600 dark:text-yellow-500">0</span>
      </div>
      <div class="bg-gray-400/10 border border-gray-400/20 rounded-xl p-3 flex flex-col items-center justify-center">
        <span class="text-2xl mb-1 drop-shadow-md">🥈</span>
        <span id="count-perak" class="font-bold text-xl text-gray-500 dark:text-gray-400">0</span>
      </div>
      <div class="bg-amber-600/10 border border-amber-600/20 rounded-xl p-3 flex flex-col items-center justify-center">
        <span class="text-2xl mb-1 drop-shadow-md">🥉</span>
        <span id="count-perunggu" class="font-bold text-xl text-amber-700 dark:text-amber-600">0</span>
      </div>
    </div>
  </div>

  <div class="space-y-3">
    <div class="flex overflow-x-auto gap-2 pb-2 hide-scrollbar">
      <button class="pill-medal px-4 py-2 rounded-xl bg-brand-red text-white text-xs font-bold whitespace-nowrap shadow-md shadow-brand-red/30 transition-all" data-class="All">All</button>
      <button class="pill-medal px-4 py-2 rounded-xl bg-white dark:bg-[#221c29] text-gray-500 dark:text-gray-400 text-xs font-bold whitespace-nowrap border border-gray-200 dark:border-gray-800 transition-all" data-class="LHTS">LHTS</button>
      <button class="pill-medal px-4 py-2 rounded-xl bg-white dark:bg-[#221c29] text-gray-500 dark:text-gray-400 text-xs font-bold whitespace-nowrap border border-gray-200 dark:border-gray-800 transition-all" data-class="Basic 1">Basic 1</button>
      <button class="pill-medal px-4 py-2 rounded-xl bg-white dark:bg-[#221c29] text-gray-500 dark:text-gray-400 text-xs font-bold whitespace-nowrap border border-gray-200 dark:border-gray-800 transition-all" data-class="Basic 2">Basic 2</button>
      <button class="pill-medal px-4 py-2 rounded-xl bg-white dark:bg-[#221c29] text-gray-500 dark:text-gray-400 text-xs font-bold whitespace-nowrap border border-gray-200 dark:border-gray-800 transition-all" data-class="ED">ED</button>
      <button class="pill-medal px-4 py-2 rounded-xl bg-white dark:bg-[#221c29] text-gray-500 dark:text-gray-400 text-xs font-bold whitespace-nowrap border border-gray-200 dark:border-gray-800 transition-all" data-class="RJ">RJ</button>
    </div>

    <div class="bg-white dark:bg-[#221c29] rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm overflow-hidden">
      <div class="px-4 py-3 bg-gray-50 dark:bg-[#2b2532] border-b border-gray-100 dark:border-gray-800 flex justify-between items-center">
        <h5 class="text-xs font-bold text-gray-700 dark:text-zinc-200 uppercase tracking-wide">Daftar Atlet Medali</h5>
      </div>
      <div id="medalist-container" class="divide-y divide-gray-100 dark:divide-gray-800/60 p-2">
        <div class="text-center py-6 text-xs text-gray-400">Memuat data prestasi...</div>
      </div>
    </div>
  </div>
</div>
