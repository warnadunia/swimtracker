<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Detail Atlet - Parents Portal</title>
  <link rel="stylesheet" href="/src/style.css">
  <script>
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) { document.documentElement.classList.add('dark'); } 
    else { document.documentElement.classList.remove('dark'); }
  </script>
</head>
<body class="bg-gray-50 dark:bg-brand-dark pb-24 text-gray-800 dark:text-gray-200">
  
  <!-- Header Minimalis -->
  <header class="sticky top-0 bg-white/90 dark:bg-[#18131f]/90 backdrop-blur-md z-40 flex justify-between items-center px-4 h-16 border-b border-gray-100 dark:border-gray-800/80 shadow-sm">
    <div class="flex items-center gap-3">
      <button onclick="window.location.href='/parents_dashboard.html'" class="p-2 bg-gray-100 dark:bg-[#251f2e] rounded-xl text-gray-500 hover:text-brand-red transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
      </button>
      <div>
        <h1 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest leading-none mb-1">Detail Anak</h1>
        <p id="detail-atlet-name" class="text-sm font-bold text-gray-800 dark:text-white leading-none">Memuat...</p>
      </div>
    </div>
  </header>

  <!-- Kontainer Konten (Dashboard & Progress dari app.html) -->
  <main id="main-container" class="p-4 max-w-md mx-auto"></main>

  <!-- Bottom Nav Khusus Parents + FAB Tengah -->
  <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/90 dark:bg-[#18131f]/90 backdrop-blur-md border-t border-gray-100 dark:border-gray-800/80 h-16 flex items-center justify-around px-2 z-40 shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)]">
    <button onclick="window.switchTab('tab-history')" class="nav-tab-btn flex flex-col items-center justify-center text-brand-red flex-1 transition-colors">
      <span class="text-xl mb-0.5">📊</span><span class="text-[9px] font-bold tracking-wider uppercase">Dashboard</span>
    </button>
    
    <!-- TOMBOL FAB TENGAH (MANGGIL MODAL MULTI-ROW) -->
    <div class="relative -top-5 px-2">
      <button id="btn-open-modal" class="bg-gradient-to-tr from-brand-red to-rose-500 text-white w-14 h-14 rounded-full shadow-lg shadow-brand-red/40 flex items-center justify-center text-2xl active:scale-95 transition-transform border-4 border-gray-50 dark:border-brand-dark">
        ➕
      </button>
    </div>

    <button onclick="window.switchTab('tab-grafik')" class="nav-tab-btn flex flex-col items-center justify-center text-gray-400 flex-1 transition-colors">
      <span class="text-xl mb-0.5">📈</span><span class="text-[9px] font-bold tracking-wider uppercase">Progress</span>
    </button>
  </div>

  <!-- Tempat Modal Multi-Row Di-render oleh JS -->
  <div id="modal-container"></div>

  <script type="module" src="/src/parent_detail.js"></script>
</body>
</html>
